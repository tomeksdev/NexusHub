name: Feature request
description: Propose a new capability or improvement
title: "[feature] "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Lead with the user pain, not the proposed solution. "I want X so I can Y."
      placeholder: |
        Operators managing many peers can't currently …
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would this look? Sketch the UX, API surface, or config shape as concretely as you can.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else did you think about, and why is this the right trade-off?

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Rough size estimate so maintainers can prioritise.
      options:
        - Small (< 1 day)
        - Medium (1-3 days)
        - Large (> 3 days)
        - Not sure

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues and this hasn't been proposed.
          required: true
