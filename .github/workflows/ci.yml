name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

permissions:
  contents: read

jobs:
  go-lint-test:
    name: Go lint & test (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [backend, cli, ebpf]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: ${{ matrix.module }}
          args: --config=../.golangci.yml

      - name: Test with coverage
        working-directory: ${{ matrix.module }}
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Coverage summary
        working-directory: ${{ matrix.module }}
        run: |
          go tool cover -func=coverage.out | tee coverage.txt
          pct=$(go tool cover -func=coverage.out | awk '/^total:/ {sub("%","",$3); print $3}')
          echo "module=${{ matrix.module }} coverage=${pct}%"
          # Per-module minimum. Tuned to the current state so CI goes
          # green today; raise deliberately as coverage grows rather
          # than letting a big PR blow through the gate silently.
          # Floors set just below the current coverage so CI passes
          # today but regressions fail. Raise deliberately in a
          # follow-up PR as new tests land.
          case "${{ matrix.module }}" in
            backend) min=15 ;;
            cli)     min=5  ;;
            ebpf)    min=35 ;;
          esac
          awk -v have="$pct" -v want="$min" \
            'BEGIN { exit (have+0 < want+0) }' \
            || { echo "::error::coverage ${pct}% < minimum ${min}%"; exit 1; }

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.module }}
          path: |
            ${{ matrix.module }}/coverage.out
            ${{ matrix.module }}/coverage.txt
          retention-days: 14

  frontend:
    name: Frontend lint, format & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: ESLint
        run: npx eslint .

      - name: Prettier check
        run: npx prettier --check .

      - name: Vitest with coverage
        run: npx vitest run --coverage

      - name: Coverage gate
        run: |
          # Vitest writes coverage/coverage-summary.json when the
          # v8 provider is enabled (see vitest.config.ts). We parse
          # the lines-percent and enforce a floor. Bump deliberately.
          pct=$(node -e \
            "console.log(Math.round(require('./coverage/coverage-summary.json').total.lines.pct))" \
            2>/dev/null || echo 0)
          # See backend floor comment above — tracks-current, ratchets up.
          min=20
          echo "frontend coverage=${pct}% (min ${min}%)"
          if [ "$pct" -lt "$min" ]; then
            echo "::error::frontend coverage ${pct}% < minimum ${min}%"
            exit 1
          fi

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend
          path: frontend/coverage/
          retention-days: 14

  docker-build:
    name: Validate Dockerfile builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: nexushub:ci

      - name: Build dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.dev
          push: false
          tags: nexushub:ci-dev
