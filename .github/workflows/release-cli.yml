name: Release CLI

# GoReleaser cuts the CLI archives (.tar.gz, .deb, .rpm, checksums.txt)
# and uploads them to the GitHub Release for the pushed tag. Multi-arch
# Docker images are handled separately by docker-publish.yml on the same
# trigger; release-please owns the CHANGELOG and creates the Release
# entry itself when its release PR merges to main.
#
# Order of operations on a tag push:
#   1. release-please-action (release.yml) merges the release PR and
#      creates the GitHub Release at the tag.
#   2. This workflow runs goreleaser to attach CLI artifacts.
#   3. docker-publish.yml builds and pushes the container image.
#
# All three are independent jobs keyed on the same tag, so order is
# eventual rather than strict.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history is required by goreleaser to compute
          # snapshot version + commit metadata in archives.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: cli/go.sum

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
