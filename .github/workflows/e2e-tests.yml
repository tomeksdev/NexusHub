name: E2E Tests

on:
  pull_request:
    branches: [dev]
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

# Credentials for the seeded super_admin. Shared with the Playwright
# config via env; tests/e2e/tests/auth.spec.ts reads the same names.
env:
  NEXUSHUB_ADMIN_EMAIL: admin@example.com
  NEXUSHUB_ADMIN_USERNAME: admin
  NEXUSHUB_ADMIN_PASSWORD: TestPass1234!

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Start stack
        working-directory: docker
        run: docker compose up -d --build --wait

      - name: Set up Go (for seed)
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache-dependency-path: backend/go.sum

      - name: Seed admin user
        # Run the seed binary host-side against the compose-published
        # Postgres port (5432). The compose api container is already
        # healthy here; seeding just writes rows.
        working-directory: backend
        env:
          DATABASE_URL: postgres://nexushub:nexushub@localhost:5432/nexushub?sslmode=disable
        run: go run ./cmd/seed

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: tests/e2e/package-lock.json

      - name: Install Playwright deps
        working-directory: tests/e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: tests/e2e
        env:
          NEXUSHUB_BASE_URL: http://localhost:8080
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: tests/e2e/playwright-report
          retention-days: 7

      - name: Tear down stack
        if: always()
        working-directory: docker
        run: docker compose logs > docker-compose.log || true

      - name: Upload compose logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: docker-compose-logs
          path: docker/docker-compose.log
          retention-days: 7
