{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "nexushub.serviceAccountName" . }}
  labels: {{- include "nexushub.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
# The API doesn't need to talk to the Kubernetes API itself — no
# role bindings here on purpose. If an operator mounts IRSA / workload
# identity via serviceAccount.annotations that's additive.
automountServiceAccountToken: false
{{- end }}
