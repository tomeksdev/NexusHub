{{- /*
Postgres DSN Secret. Same keep policy as the app Secret — losing
the credential on accidental uninstall is a mistake no one wants.
*/ -}}
{{- if not .Values.postgres.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nexushub.postgresSecretName" . }}
  labels: {{- include "nexushub.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  {{ .Values.postgres.urlKey }}: {{ required "postgres.url is required unless postgres.existingSecret is set" .Values.postgres.url | quote }}
{{- end }}
