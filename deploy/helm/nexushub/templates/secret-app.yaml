{{- /*
App Secret carrying JWT_SECRET + PEER_KEY_ENCRYPTION_KEY. Only
rendered when the operator didn't supply an existingSecret. The
required() calls fail helm install with a clear error when either
value is empty — better than silently deploying a broken app.
*/ -}}
{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nexushub.appSecretName" . }}
  labels: {{- include "nexushub.labels" . | nindent 4 }}
  annotations:
    # helm.sh/resource-policy: keep ensures a `helm uninstall` does
    # NOT delete the Secret. Otherwise an accidental `helm uninstall
    # && helm install` round trip would lose PEER_KEY_ENCRYPTION_KEY
    # and make every stored peer private key undecryptable.
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  JWT_SECRET: {{ required "secrets.jwtSecret is required unless secrets.existingSecret is set. Generate one with: openssl rand -base64 48" .Values.secrets.jwtSecret | quote }}
  PEER_KEY_ENCRYPTION_KEY: {{ required "secrets.peerKeyEncryptionKey is required unless secrets.existingSecret is set. Generate one with: openssl rand -base64 32 (must be exactly 32 bytes decoded)" .Values.secrets.peerKeyEncryptionKey | quote }}
{{- end }}
