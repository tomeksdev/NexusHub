apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nexushub.fullname" . }}
  labels: {{- include "nexushub.labels" . | nindent 4 }}
data:
  PORT: "8080"
  GIN_MODE: release
  JWT_ACCESS_EXPIRY: {{ .Values.config.jwtAccessExpiry | quote }}
  JWT_REFRESH_EXPIRY: {{ .Values.config.jwtRefreshExpiry | quote }}
  AUDIT_RETENTION_DAYS: {{ .Values.config.auditRetentionDays | quote }}
  RATELIMIT_LOGIN_PER_MINUTE: {{ .Values.config.rateLimitLoginPerMinute | quote }}
  RATELIMIT_LOGIN_BURST: {{ .Values.config.rateLimitLoginBurst | quote }}
  RATELIMIT_REFRESH_PER_MINUTE: {{ .Values.config.rateLimitRefreshPerMinute | quote }}
  RATELIMIT_REFRESH_BURST: {{ .Values.config.rateLimitRefreshBurst | quote }}
  {{- if .Values.config.wgEndpoint }}
  WG_ENDPOINT: {{ .Values.config.wgEndpoint | quote }}
  {{- end }}
  {{- if .Values.tracing.endpoint }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.tracing.endpoint | quote }}
  OTEL_EXPORTER_OTLP_INSECURE: {{ .Values.tracing.insecure | quote }}
  OTEL_SERVICE_NAME: {{ .Values.tracing.serviceName | quote }}
  OTEL_TRACES_SAMPLER_ARG: {{ .Values.tracing.samplerArg | quote }}
  {{- end }}
