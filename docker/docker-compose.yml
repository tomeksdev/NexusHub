services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://nexushub:nexushub@postgres:5432/nexushub?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    cap_add:
      - NET_ADMIN
    cap_drop:
      - ALL
    restart: unless-stopped

  postgres:
    image: postgres:16-bookworm
    environment:
      POSTGRES_USER: nexushub
      POSTGRES_PASSWORD: nexushub
      POSTGRES_DB: nexushub
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexushub"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
