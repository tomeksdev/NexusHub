version: "2"

run:
  go: '1.25'
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - misspell
  settings:
    misspell:
      locale: US
    errcheck:
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (io.Closer).Close
        - (*os.File).Close
        - (*net/http.Response.Body).Close
        - os.Remove
        - os.RemoveAll
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - unused

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/tomeksdev/NexusHub

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
